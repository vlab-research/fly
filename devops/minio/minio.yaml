# MinIO — S3-compatible object storage for transient CSV exports.
#
# This is a hand-rolled single-node MinIO (upstream minio/minio image), NOT the
# Bitnami helm chart. It was previously deployed via `kubectl apply` from
# manifests that were never committed; this file recovers them into the repo as
# infrastructure-as-code. Apply with:
#
#     kubectl apply -f devops/minio/
#
# The `minio-auth` Secret (keys root-user / root-password) is managed
# out-of-band and is intentionally NOT templated here — it holds credentials.
# The exporter and dashboard reach this via the `minio` Service
# (minio.minio.svc:9000) and the storage-api.vlab.digital / storage.vlab.digital
# ingresses (see devops/minio/ingress.yaml).
#
# Retention of export objects is enforced server-side by a bucket lifecycle rule
# applied by the exporter itself (see documentation/exports-storage.md), not here.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: minio
  namespace: minio
  labels:
    app.kubernetes.io/instance: minio
    app.kubernetes.io/name: minio
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio
  namespace: minio
  labels:
    app.kubernetes.io/instance: minio
    app.kubernetes.io/name: minio
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard-rwo
  resources:
    requests:
      # 25Gi (was 10Gi): headroom over the 3-day export retention window;
      # single full_messages exports can reach ~1.6G. standard-rwo (GKE pd.csi)
      # supports online expansion, so growing this is a non-destructive patch.
      storage: 25Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: minio
  labels:
    app.kubernetes.io/instance: minio
    app.kubernetes.io/name: minio
spec:
  replicas: 1
  # Recreate (not RollingUpdate): the RWO PVC can only attach to one pod, so the
  # old pod must terminate before the new one starts. Expect a brief outage on
  # deploy.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/instance: minio
      app.kubernetes.io/name: minio
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: minio
        app.kubernetes.io/name: minio
    spec:
      serviceAccountName: minio
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: minio
          # Pinned to the release that was running under the old :latest tag, so
          # applying this does not silently upgrade MinIO.
          image: minio/minio:RELEASE.2025-09-07T16-13-09Z
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
          args:
            - minio server /data --console-address :9001
          ports:
            - name: minio-api
              containerPort: 9000
              protocol: TCP
            - name: minio-console
              containerPort: 9001
              protocol: TCP
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-auth
                  key: root-user
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-auth
                  key: root-password
            - name: MINIO_BROWSER
              value: "on"
            - name: MINIO_PROMETHEUS_AUTH_TYPE
              value: "public"
            - name: MINIO_PROMETHEUS_URL
              value: "http://prometheus-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090"
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: minio-api
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: minio-api
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 1
            failureThreshold: 5
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: minio
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: minio
  labels:
    app.kubernetes.io/instance: minio
    app.kubernetes.io/name: minio
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/instance: minio
    app.kubernetes.io/name: minio
  ports:
    - name: minio-api
      port: 9000
      protocol: TCP
      targetPort: minio-api
---
apiVersion: v1
kind: Service
metadata:
  name: minio-console
  namespace: minio
  labels:
    app.kubernetes.io/instance: minio
    app.kubernetes.io/name: minio
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/instance: minio
    app.kubernetes.io/name: minio
  ports:
    - name: http
      port: 9090
      protocol: TCP
      targetPort: minio-console
