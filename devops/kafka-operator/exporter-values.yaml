# tied to single kafka release...
kafkaExporter:
  kafka:
    servers:
      - kafka-headless:29092

image:
  repository: danielqsj/kafka-exporter
  # Pinned (never :latest/Always) — metric names here back the lag alerts.
  tag: v1.9.0
  pullPolicy: IfNotPresent

prometheus:
  serviceMonitor: 
    enabled: true
