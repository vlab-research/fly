apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: kafka-servicemonitor
  labels:
    app: kafka
    kafka_cr: kafka
    release: prometheus-operator
spec:
  selector:
    matchLabels:
      app: kafka
      kafka_cr: kafka
  namespaceSelector:
    matchNames:
    - default
  endpoints:
  - interval: 10s
    port: metrics
    path: /metrics
    honorLabels: true
    relabelings:
    - sourceLabels: [__meta_kubernetes_pod_ip]
      separator: ;
      regex: (.*)
      targetLabel: pod_ip
      replacement: $1
      action: replace
    - sourceLabels: [__meta_kubernetes_pod_label_brokerId]
      separator: ;
      regex: (.*)
      targetLabel: brokerId
      replacement: $1
      action: replace
    - sourceLabels: [__meta_kubernetes_pod_label_kafka_cr]
      separator: ;
      regex: (.*)
      targetLabel: kafka_cr
      replacement: $1
      action: replace
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: cruisecontrol-servicemonitor
  labels:
    app: kafka
    kafka_cr: kafka
    release: prometheus-operator
spec:
  selector:
    matchLabels:
      app: cruisecontrol
  namespaceSelector:
    matchNames:
    - default
  endpoints:
  - interval: 10s
    port: metrics
    path: /metrics
    honorLabels: true
# NOTE: The Kafka broker alerts that used to live here (PrometheusRule
# `kafka-alerts`) were the banzaicloud koperator defaults — stale static
# thresholds (BrokerOverLoaded > 30 req/s, PartitionCountHigh > 100) with
# vestigial auto-scale annotations (wurstmeister/kafka:2.12-2.3.0, command:
# upScale). They fired permanently against a healthy cluster and trained
# everyone to ignore #vlab-alerts. Retired and replaced by hand-authored,
# meaningful rules in devops/alerts/ (Helm release `vlab-alerts`, template
# kafka-broker-health.yaml): offline partitions, controller count,
# under-replication, and disk space. The two ServiceMonitors above stay here —
# they feed the broker metrics those rules consume.
