# empty, use deploy values
#
#
# Hermes off by default; staging.yaml sets hermes.enabled: true. This keeps the
# staging-only -wa ingester from ever rendering in production.
hermes:
  enabled: false

# botserver on by default (production still runs it); staging.yaml sets
# botserver.enabled: false because hermes fully replaces it there.
botserver:
  enabled: true

cockroachdb:
  enabled: true

kakfka:
  enabled: true

exodus:
  api:
    enabled: true
