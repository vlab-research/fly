tags:
  kafka: false
  backup: false
  cockroach: true
  redis: true
  naughtybot: false
  botscribe: false
  scratchbot: false
  scribble: true
  dean: true

kafkabrokers: &kb "kafka-headless.default.svc.cluster.local:29092"
chatTopic: &topic "vlab-staging-chat-events"
stateTopic: &statetopic "vlab-staging-state"
responseTopic: &responsetopic "vlab-staging-response"
paymentTopic: &paymenttopic "vlab-staging-payment"
botEnvs: &botenvs gbv-bot-envs
chatbaseHost: &host "gbv-cockroachdb-public"
exporterTopic: &exportertopic "vlab-staging-exports"
chatLogTopic: &chatlogtopic "vlab-staging-chat-log"
commandsTopic: &commandstopic "vlab-staging-commands"

versionDashboard: &vdashboard v0.0.64
versionBotserver: &vbotserver v0.0.12
versionReplybot: &vreplybot v0.0.196
versionLinksniffer: &vlinksniffer v0.0.6
versionDean: &vdean v0.0.41
versionScribble: &vscribble v0.0.32
versionDinersclub: &vdinersclub v0.0.40
versionFormcentral: &vformcentral v0.0.12
versionExporter: &vexporter v0.6.7
versionExodus: &vexodus v0.2.1
versionMessageWorker: &vmessageworker v0.1.0

processingAlerts: []
laggingAlerts: []

kafkaTopics:
  - name: *topic
    partitions: 8
    replicationFactor: 3
    config:
      "retention.ms": "2678400000" # 31 days
  - name: *statetopic
    partitions: 2
    replicationFactor: 2
    config:
      "retention.ms": "2678400000" # 31 days
  - name: *responsetopic
    partitions: 2
    replicationFactor: 2
    config:
      "retention.ms": "2678400000" # 31 days
  - name: *paymenttopic
    partitions: 2
    replicationFactor: 2
    config:
      "retention.ms": "2678400000" # 31 days
  - name: *exportertopic
    partitions: 2
    replicationFactor: 2
    config:
      "retention.ms": "2678400000" # 31 days
  - name: *chatlogtopic
    partitions: 12
    replicationFactor: 1
    config:
      "retention.ms": "2678400000" # 31 days
  - name: *commandstopic
    partitions: 6
    replicationFactor: 2
    config:
      "retention.ms": "2678400000" # 31 days



dinersclub:
  replicaCount: 1
  image:
    repository: ghcr.io/vlab-research/dinersclub
    tag: *vdinersclub
    pullPolicy: Always
  resources:
    requests:
      cpu: 5m
      memory: 16Mi
  envFrom: gbv-bot-envs
  env:
    - name: CACHE_TTL
      value: "1h"
    - name: CACHE_NUM_COUNTERS
      value: "1000"
    - name: CACHE_MAX_COST
      value: "1000"
    - name: CACHE_BUFFER_ITEMS
      value: "64"
    - name: RELOADLY_SANDBOX
      value: "true"
    - name: BOTSERVER_URL
      value: "http://gbv-botserver/synthetic"
    - name: CHATBASE_DATABASE
      value: "chatroach"
    - name: CHATBASE_HOST
      value: *host
    - name: CHATBASE_PORT
      value: "26257"
    - name: CHATBASE_USER
      value: "chatroach"
    - name: CHATBASE_MAX_CONNECTIONS
      value: "1"
    - name: KAFKA_BROKERS
      value: *kb
    - name: KAFKA_POLL_TIMEOUT
      value: "10s"
    - name: KAFKA_TOPIC
      value: *paymenttopic
    - name: KAFKA_GROUP
      value: "dinersclub"
    - name: DINERSCLUB_BATCH_SIZE
      value: "1"
    - name: DINERSCLUB_RETRY_BOTSERVER
      value: "2m"
    - name: DINERSCLUB_RETRY_PROVIDER
      value: "2m"
    - name: DINERSCLUB_POOL_SIZE
      value: "1"
    - name: DINERSCLUB_PROVIDERS
      value: "fake,reloadly,giftcard,http"


dean:
  image:
    repository: ghcr.io/vlab-research/dean
    tag: *vdean
    pullPolicy: Always
  env:
  - name: CHATBASE_DATABASE
    value: "chatroach"
  - name: CHATBASE_USER
    value: "chatroach"
  - name: CHATBASE_PASSWORD
    value: ""
  - name: CHATBASE_HOST
    value: *host
  - name: CHATBASE_PORT
    value: "26257"
  - name: BOTSERVER_URL
    value: "http://gbv-botserver/synthetic"
  - name: DEAN_ERROR_TAGS
    value: "NETWORK,INTERNAL,STATE_ACTIONS"
  - name: DEAN_ERROR_INTERVAL
    value: "48 hours"
  - name: DEAN_FB_CODES
    value: "2022,613,-1,190,80006,551"
  - name: DEAN_BLOCKED_INTERVAL
    value: "48 hours"
  - name: DEAN_RESPONDING_INTERVAL
    value: "48 hours"
  - name: DEAN_RESPONDING_GRACE
    value: "20 minutes"
  - name: DEAN_RETRY_MAX_ATTEMPTS
    value: "30"
  - name: DEAN_PAYMENT_GRACE
    value: "2 hours"
  - name: DEAN_PAYMENT_INTERVAL
    value: "14 days"
  - name: DEAN_PAYMENT_MAX_ATTEMPTS
    value: "30"
  - name: DEAN_TIMEOUT_MAX_ATTEMPTS
    value: "5"
  - name: DEAN_SEND_DELAY
    value: "3s"
  - name: DEAN_FOLLOWUP_MIN
    value: "12 hours"
  - name: DEAN_FOLLOWUP_MAX
    value: "24 hours"
  - name: DEAN_TIMEOUT_BLACKLIST
    value: "bebborsbaseserb,bebbobg2basebul,nciaim2followup2pay,nciaim2followup1pay,nciaim2baselinepay"
  - name: DEAN_TIMEOUT_MAX_PAST
    value: "72 hours"
  - name: DEAN_SPAMMER_EXTERNAL_EVENTS_MAX
    value: "100"
  queries:
    - name: respondings
      queries: "respondings,blocked,errored"
      schedule: "*/30 * * * *"
      resources:
        requests:
          cpu: 10m
          memory: 10Mi
    - name: followups
      queries: "followups"
      schedule: "0 5-19 * * *"
      resources:
        requests:
          cpu: 10m
          memory: 10Mi
    - name: timeouts
      queries: "timeouts"
      schedule: "*/10 * * * *"
      resources:
        requests:
          cpu: 10m
          memory: 10Mi
    - name: payments
      queries: "payments"
      schedule: "0 */6 * * *"
      resources:
        requests:
          cpu: 10m
          memory: 10Mi
    - name: spammers
      queries: "spammers"
      schedule: "30 3 * * *"
      resources:
        requests:
          cpu: 10m
          memory: 10Mi

scribble:
  image:
    repository: vlabresearch/scribble
    tag: *vscribble
    pullPolicy: Always
  resources:
    requests:
      cpu: 40m
      memory: 64Mi
  env:
  - name: CHATBASE_DATABASE
    value: "chatroach"
  - name: CHATBASE_USER
    value: "chatroach"
  - name: CHATBASE_PASSWORD
    value: ""
  - name: CHATBASE_HOST
    value: *host
  - name: CHATBASE_PORT
    value: "26257"
  - name: KAFKA_BROKERS
    value: *kb
  - name: KAFKA_POLL_TIMEOUT
    value: "2s"
  - name: SCRIBBLE_ERROR_HANDLERS
    value: ""

  sinks:
    - destination: "states"
      replicaCount: 1
      env:
      - name: KAFKA_TOPIC
        value: *statetopic
      - name: KAFKA_GROUP
        value: "scribble-states"
      - name: SCRIBBLE_CHUNK_SIZE
        value: "128"
      - name: SCRIBBLE_BATCH_SIZE
        value: "128"
      - name: SCRIBBLE_STRICT_MODE
        value: "false"
    - destination: "responses"
      replicaCount: 1
      env:
      - name: KAFKA_TOPIC
        value: *responsetopic
      - name: KAFKA_GROUP
        value: "scribble-responses"
      - name: SCRIBBLE_CHUNK_SIZE
        value: "32"
      - name: SCRIBBLE_BATCH_SIZE
        value: "64"
      - name: SCRIBBLE_STRICT_MODE
        value: "false"
    - destination: "messages"
      replicaCount: 1
      env:
      - name: KAFKA_TOPIC
        value: *topic
      - name: KAFKA_GROUP
        value: "scribble-messages"
      - name: SCRIBBLE_CHUNK_SIZE
        value: "32"
      - name: SCRIBBLE_BATCH_SIZE
        value: "128"
      - name: SCRIBBLE_STRICT_MODE
        value: "true"
    - destination: "chat-log"
      replicaCount: 1
      env:
      - name: KAFKA_TOPIC
        value: *chatlogtopic
      - name: KAFKA_GROUP
        value: "scribble-chat-log"
      - name: SCRIBBLE_CHUNK_SIZE
        value: "32"
      - name: SCRIBBLE_BATCH_SIZE
        value: "128"
      - name: SCRIBBLE_STRICT_MODE
        value: "false"


replybot:
  replicaCount: 1
  image:
    repository: ghcr.io/vlab-research/replybot
    tag: *vreplybot
    pullPolicy: Always

  envFrom: *botenvs
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
  env:
  - name: FAKE
    value: "NOTHING"
  - name: CHATBASE_BACKEND
    value: "@vlab-research/chatbase-postgres"
  - name: CHATBASE_DATABASE
    value: "chatroach"
  - name: CHATBASE_USER
    value: "chatroach"
  - name: CHATBASE_PASSWORD
    value: ""
  - name: CHATBASE_HOST
    value: *host
  - name: CHATBASE_PORT
    value: "26257"
  - name: FALLBACK_FORM
    value: "305"
  - name: REPLYBOT_EVENT_TOPIC
    value: *topic
  - name: REPLYBOT_RESET_SHORTCODE
    value: "reset"
  - name: KAFKA_BROKERS
    value: *kb
  - name: BOTSPINE_MESSAGE_TOPIC
    value: *topic
  - name: BOTSPINE_KAFKA_BROKERS
    value: *kb
  - name: VLAB_STATE_TOPIC
    value: *statetopic
  - name: VLAB_RESPONSE_TOPIC
    value: *responsetopic
  - name: VLAB_PAYMENT_TOPIC
    value: *paymenttopic
  - name: KAFKA_COMMANDS_TOPIC
    value: *commandstopic
  - name: BOTSERVER_URL
    value: "http://gbv-botserver"
  - name: FACEBOOK_GRAPH_URL
    value: "https://graph.facebook.com/v25.0"
  - name: FORMCENTRAL_URL
    value: "http://gbv-formcentral"
  - name: STATE_STORE_LIMIT
    value: "30000"
  - name: NUM_SPINES
    value: "6"
  - name: REDIS_HOST
    value: "gbv-redis-master"
  - name: REDIS_PORT
    value: "6379"
  - name: REDIS_PASSWORD
    valueFrom:
      secretKeyRef:
        name: gbv-redis
        key: redis-password
  - name: REDIS_DB
    value: "0"
  - name: VLAB_CHAT_LOG_TOPIC
    value: *chatlogtopic

formcentral:
  replicaCount: 1
  image:
    tag: *vformcentral
  env:
  - name: CHATBASE_DATABASE
    value: "chatroach"
  - name: CHATBASE_USER
    value: "chatroach"
  - name: CHATBASE_PASSWORD
    value: ""
  - name: CHATBASE_HOST
    value: *host
  - name: CHATBASE_PORT
    value: "26257"
  - name: CHATBASE_MAX_CONNECTIONS
    value: "6"
  - name: PORT
    value: "1323"
  resources:
    requests:
      cpu: 10m
      memory: 10Mi

linksniffer:
  replicaCount: 1

  image:
    repository: vlabresearch/linksniffer
    tag: *vlinksniffer
    pullPolicy: Always

  env:
  - name: BOTSERVER_URL
    value: "http://gbv-botserver/synthetic"

  resources:
    requests:
      cpu: 10m
      memory: 50Mi

  ingress:
    enabled: true
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      kubernetes.io/ingress.class: nginx
    hosts:
      - host: staging.links.vlab.digital
        paths:
          - path: '/'
            pathType: Prefix
    tls:
      - secretName: gbv-linksniffer-cert
        hosts:
          - staging.links.vlab.digital

  service:
    type: ClusterIP
    port: 80

dashboard:
  replicaCount: 1

  image:
    repository: ghcr.io/vlab-research/dashboard
    tag: *vdashboard
    pullPolicy: Always

  envFrom: *botenvs
  env:
    - name: FAKE
      value: 'nope'
    - name: TYPEFORM_URL
      value: 'https://api.typeform.com'
    - name: CUBEJS_API_SECRET
      value: 'notasecret'
    - name: CUBEJS_DB_TYPE
      value: 'postgres'
    - name: DB_DATABASE
      value: 'chatroach'
    - name: CUBEJS_DB_NAME
      value: 'chatroach'
    - name: DB_USER
      value: 'chatroach'
    - name: CUBEJS_DB_USER
      value: 'chatroach'
    - name: DB_PASSWORD
      value: ''
    - name: CUBEJS_DB_PASS
      value: ''
    - name: DB_HOST
      value: *host
    - name: CUBEJS_DB_HOST
      value: *host
    - name: DB_PORT
      value: '26257'
    - name: CUBEJS_DB_PORT
      value: '26257'
    - name: FORMCENTRAL_URL
      value: 'http://gbv-formcentral'
    - name: TYPEFORM_REDIRECT_URL
      value: 'https://staging--vlab-research.netlify.app/surveys/auth'
    - name: FACEBOOK_GRAPH_URL
      value: 'https://graph.facebook.com/v25.0'
    - name: KAFKA_BROKERS
      value: *kb
    - name: KAFKA_EXPORTS_TOPIC
      value: *exportertopic
    - name: EXODUS_API_URL
      value: "http://gbv-exodus-api"
  resources:
    requests:
      cpu: 10m
      memory: 64Mi

  ingress:
    enabled: true
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      kubernetes.io/ingress.class: nginx
      nginx.ingress.kubernetes.io/proxy-body-size: "200m"
    hosts:
      - host: staging.fly-dashboard-api.vlab.digital
        paths:
          - path: '/'
            pathType: Prefix
    tls:
      - secretName: gbv-dashboard-cert
        hosts:
          - staging.fly-dashboard-api.vlab.digital

  service:
    type: ClusterIP
    port: 80


botserver:
  replicaCount: 1

  image:
    repository: vlabresearch/botserver
    tag: *vbotserver
    pullPolicy: Always

  envFrom: *botenvs

  env:
  - name: BOTSERVER_EVENT_TOPIC
    value: *topic
  - name: KAFKA_BROKERS
    value: *kb
  - name: PORT
    value: "80"
  - name: DASHBOARD_URL
    value: "http://gbv-dashboard"

  resources:
    requests:
      cpu: 10m
      memory: 128Mi

  ingress:
    enabled: true
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      kubernetes.io/ingress.class: nginx
    hosts:
      - host: staging.fly-botserver.vlab.digital
        paths:
          - path: '/'
            pathType: Prefix
    tls:
      - secretName: gbv-botserver-cert
        hosts:
          - staging.fly-botserver.vlab.digital

  service:
    type: ClusterIP
    port: 80

# Configuration for Exporter Worker
exporter:
  replicaCount: 1
  image:
    repository: "ghcr.io/vlab-research/exporter"
    pullPolicy: Always
    tag: *vexporter
  env:
    - name: "APP_NAME"
      value: "exporter"
    - name: KAFKA_BROKERS
      value: *kb
    - name: KAFKA_TOPIC
      value: *exportertopic
    - name: KAFKA_GROUP_ID
      value: "exporter-staging"
  envSecrets:
    - exporter

exodus:
  image:
    repository: vlabresearch/exodus
    tag: *vexodus
    pullPolicy: Always
  env:
  - name: CHATBASE_DATABASE
    value: "chatroach"
  - name: CHATBASE_USER
    value: "chatroach"
  - name: CHATBASE_PASSWORD
    value: ""
  - name: CHATBASE_HOST
    value: *host
  - name: CHATBASE_PORT
    value: "26257"
  - name: BOTSERVER_URL
    value: "http://gbv-botserver/synthetic"
  - name: DRY_RUN
    value: "false"
  - name: EXODUS_RATE_LIMIT
    value: "1s"
  - name: EXODUS_MAX_BAIL_USERS
    value: "100000"
  executor:
    enabled: true
    schedule: "* * * * *"
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
  api:
    enabled: true
    resources:
      requests:
        cpu: 50m
        memory: 64Mi

message-worker:
  replicaCount: 1
  image:
    repository: ghcr.io/vlab-research/message-worker
    tag: *vmessageworker
    pullPolicy: Always
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  envFrom: *botenvs
  env:
  - name: KAFKA_BROKERS
    value: *kb
  - name: KAFKA_COMMAND_TOPIC
    value: *commandstopic
  - name: KAFKA_EVENT_TOPIC
    value: *topic
  - name: KAFKA_GROUP_ID
    value: "message-worker"
  - name: KAFKA_AUTO_OFFSET_RESET
    value: "latest"
  - name: DATABASE_URL
    value: "postgresql://chatroach@gbv-cockroachdb-public:26257/chatroach?sslmode=disable"
  - name: BOTSERVER_URL
    value: "http://gbv-botserver"
  - name: FACEBOOK_GRAPH_URL
    value: "https://graph.facebook.com/v25.0"
  - name: NUM_WORKERS
    value: "1"
  - name: MAX_RETRY_ATTEMPTS
    value: "3"
  - name: INITIAL_BACKOFF_MS
    value: "100"
  - name: MAX_BACKOFF_MS
    value: "1000"

cockroachdb:
  image:
    tag: v24.1.28
  statefulset:
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 500Mi
    budget:
      maxUnavailable: 0
  conf:
    cache: 250MiB
    max-sql-memory: 250MiB
    max-disk-temp-storage: 4GiB
  tls:
    enabled: no
  storage:
    persistentVolume:
      size: 5Gi
      storageClass: "pd-ssd"

redis:
  enabled: true
  image:
    registry: docker.io
    repository: bitnamilegacy/redis
    tag: 8.2.1-debian-12-r0
  architecture: replication
  auth:
    enabled: true
    sentinel: false
  master:
    persistence:
      enabled: true
      size: 2Gi
      storageClass: "pd-ssd"
    resources:
      requests:
        memory: 128Mi
        cpu: 100m
      limits:
        memory: 256Mi
        cpu: 200m
    podAnnotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "6379"
  replica:
    replicaCount: 1
    persistence:
      enabled: true
      size: 2Gi
      storageClass: "pd-ssd"
    resources:
      requests:
        memory: 128Mi
        cpu: 100m
      limits:
        memory: 256Mi
        cpu: 200m
    podAnnotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "6379"
  metrics:
    enabled: true
    image:
      registry: docker.io
      repository: bitnamilegacy/redis-exporter
      tag: 1.76.0-debian-12-r0
    serviceMonitor:
      enabled: true
      interval: 30s
  networkPolicy:
    enabled: true
    allowExternal: false
  podSecurityContext:
    enabled: true
    fsGroup: 1001
    runAsUser: 1001
  containerSecurityContext:
    enabled: true
    runAsUser: 1001
    runAsNonRoot: true
