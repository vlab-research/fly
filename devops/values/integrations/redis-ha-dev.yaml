image:
  repository: redis
  tag: 7-alpine

replicas: 1

redis:
  port: 6379
  config:
    min-replicas-to-write: 0
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 128Mi
      cpu: 100m

sentinel:
  port: 26379
  quorum: 1

haproxy:
  enabled: true
  replicas: 1
  image:
    repository: haproxy
    tag: "3.0-alpine"
  resources:
    requests:
      memory: 16Mi
      cpu: 10m

persistentVolume:
  enabled: true
  size: 1Gi

auth: false

exporter:
  enabled: false

metrics:
  serviceMonitor:
    enabled: false
