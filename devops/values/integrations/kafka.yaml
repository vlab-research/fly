chatTopic: &topic chat-events
stateTopic: &statetopic vlab-state
responseTopic: &responsetopic vlab-response
paymentTopic: &paymenttopic vlab-payment
exportTopic: &exporttopic vlab-exports

# KRaft mode configuration
kraft:
  enabled: true
  clusterId: ""  # Will be auto-generated on first init

# Controller configuration (combined controller+broker mode)
controller:
  replicaCount: 1
  controllerOnly: false

resources:
  requests:
    cpu: 25m
    memory: 200Mi

# Kafka broker configuration
autoCreateTopicsEnable: false
defaultReplicationFactor: 1
offsetsTopicReplicationFactor: 1
heapOpts: "-Xmx500M -Xms500M"

# External access via NodePort for local dev testing
externalAccess:
  enabled: true
  autoDiscovery:
    enabled: false
  controller:
    service:
      type: NodePort
      nodePorts:
        - 30092
      domain: "127.0.0.1"
      useHostIPs: false

persistence:
  size: 1Gi

# Topic provisioning
provisioning:
  enabled: true
  topics:
    - name: *topic
      partitions: 6
      replicationFactor: 1
      config:
        # 14 days
        retention.ms: "1209600000"
    - name: *statetopic
      partitions: 6
      replicationFactor: 1
      config:
        retention.ms: "1209600000"
    - name: *responsetopic
      partitions: 6
      replicationFactor: 1
      config:
        retention.ms: "1209600000"
    - name: *paymenttopic
      partitions: 2
      replicationFactor: 1
      config:
        retention.ms: "1209600000"
    - name: *exporttopic
      partitions: 2
      replicationFactor: 1
      config:
        retention.ms: "1209600000"
