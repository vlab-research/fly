# LIVE AlertManager config — Slack-only, two-channel severity routing.
# This is what is DEPLOYED (base config in the `alertmanager` secret, monitoring
# namespace; the prometheus-operator regenerates the mounted `...-generated`
# secret from it and AlertManager hot-reloads).
#
#   severity=critical      -> #vlab-alerts-critical   (e.g. KubeProxyDown, our *page* rules)
#   severity=warning/info  -> #vlab-alerts            (default)
#   Watchdog               -> silenced (null receiver; no dead-man's-switch yet)
#
# Webhooks are injected at apply time from a gitignored secret.env by apply.sh —
# NEVER commit real hooks.slack.com URLs. To add real paging later (ntfy /
# Telegram), see README.md and alertmanager-full.yaml.example.
global:
  resolve_timeout: 5m
route:
  receiver: 'slack-warning'
  group_by: ['alertname']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  routes:
    - matchers: [ 'alertname="Watchdog"' ]
      receiver: 'null'
    - matchers: [ 'severity="critical"' ]
      receiver: 'slack-critical'
      group_wait: 30s
      repeat_interval: 4h
receivers:
  - name: 'null'
  - name: 'slack-warning'
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_WARNING}'
        channel: '#vlab-alerts'
        send_resolved: true
        title: '{{ if eq .Status "firing" }}⚠️{{ else }}✅{{ end }} [{{ .CommonLabels.severity }}] {{ .CommonLabels.alertname }}'
        text: "{{ range .Alerts }}{{ .Annotations.summary }}{{ .Annotations.message }}{{ .Annotations.description }}\n{{ end }}"
  - name: 'slack-critical'
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_CRITICAL}'
        channel: '#vlab-alerts-critical'
        send_resolved: true
        title: '{{ if eq .Status "firing" }}🔴{{ else }}✅{{ end }} [CRITICAL] {{ .CommonLabels.alertname }}'
        text: "{{ range .Alerts }}{{ .Annotations.summary }}{{ .Annotations.message }}{{ .Annotations.description }}\n{{ end }}"
