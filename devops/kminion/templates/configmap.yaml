apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kminion.fullname" . }}
  labels:
    {{- include "kminion.labels" . | nindent 4 }}
data:
  config.yaml: |
    kafka:
      brokers:
        {{- range .Values.kafka.brokers }}
        - {{ . | quote }}
        {{- end }}
      sasl:
        enabled: {{ .Values.kafka.sasl.enabled }}
      tls:
        enabled: {{ .Values.kafka.tls.enabled }}
    minion:
      consumerGroups:
        enabled: {{ .Values.minion.consumerGroups.enabled }}
        scrapeMode: {{ .Values.minion.consumerGroups.scrapeMode }}
      topics:
        enabled: {{ .Values.minion.topics.enabled }}
        granularity: {{ .Values.minion.topics.granularity }}
      endToEnd:
        enabled: {{ .Values.minion.endToEnd.enabled }}
    exporter:
      host: ""
      port: {{ .Values.exporter.port }}
    logger:
      level: info
