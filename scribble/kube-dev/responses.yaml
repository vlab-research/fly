apiVersion: apps/v1
kind: Deployment
metadata:
  name: scribble-responses
  labels:
    app: scribble-responses
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scribble-responses
  template:
    metadata:
      labels:
        app: scribble-responses
    spec:
      containers:
      - name: scribble
        image: localhost:5000/scribble:registry
        imagePullPolicy: Always
        env:
        - name: CHATBASE_DATABASE
          value: "chatroach"
        - name: CHATBASE_USER
          value: "chatroach"
        - name: CHATBASE_PASSWORD
          value: ""
        - name: CHATBASE_HOST
          value: "cockroach"
        - name: CHATBASE_PORT
          value: "26257"
        - name: KAFKA_BROKERS
          value: "redpanda:9092"
        - name: KAFKA_POLL_TIMEOUT
          value: "2s"
        - name: KAFKA_TOPIC
          value: "vlab-response"
        - name: KAFKA_GROUP
          value: "scribble-responses"
        - name: SCRIBBLE_DESTINATION
          value: "responses"
        - name: SCRIBBLE_BATCH_SIZE
          value: "32"
        - name: SCRIBBLE_CHUNK_SIZE
          value: "32"
        - name: SCRIBBLE_ERROR_HANDLERS
          value: ""
        - name: SCRIBBLE_STRICT_MODE
          value: "false"
