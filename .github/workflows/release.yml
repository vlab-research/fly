name: release

on:
  push:
    tags:
      - '*-v[0-9]+.[0-9]+.[0-9]+'

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Parse tag
        id: parse
        run: |
          TAG="${GITHUB_REF_NAME}"
          SERVICE="${TAG%-v*}"
          VERSION="v${TAG##*-v}"
          echo "service=$SERVICE" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Resolve build context and image name
        id: resolve
        run: |
          case "${{ steps.parse.outputs.service }}" in
            replybot)       CTX=replybot           ; IMG=replybot         ;;
            dashboard)      CTX=dashboard-server   ; IMG=dashboard        ;;
            botserver)      CTX=botserver          ; IMG=botserver        ;;
            dean)           CTX=dean               ; IMG=dean             ;;
            dinersclub)     CTX=dinersclub         ; IMG=dinersclub       ;;
            scribble)       CTX=scribble           ; IMG=scribble         ;;
            linksniffer)    CTX=linksniffer        ; IMG=linksniffer      ;;
            formcentral)    CTX=formcentral        ; IMG=formcentral      ;;
            exporter)       CTX=exporter           ; IMG=exporter         ;;
            exodus)         CTX=exodus             ; IMG=exodus           ;;
            testrunner)     CTX=facebot/testrunner ; IMG=testrunner       ;;
            message-worker) CTX=message-worker     ; IMG=message-worker   ;;
            *)
              echo "Unknown service '${{ steps.parse.outputs.service }}' — add it to .github/workflows/release.yml" >&2
              exit 1
              ;;
          esac
          echo "context=$CTX" >> "$GITHUB_OUTPUT"
          echo "image=$IMG"   >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: ${{ steps.resolve.outputs.context }}
          push: true
          tags: ghcr.io/vlab-research/${{ steps.resolve.outputs.image }}:${{ steps.parse.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
